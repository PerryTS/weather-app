name: Weather
options:
  bundleIdPrefix: com.perry
  deploymentTarget:
    macOS: "15.0"
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  Weather:
    type: application
    platform: macOS
    sources:
      - path: WeatherMac
        excludes:
          - "**/*.plist"
          - "**/*.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.perry.weather
        INFOPLIST_FILE: WeatherMac/Info.plist
        CODE_SIGN_ENTITLEMENTS: WeatherMac/Weather.entitlements
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: K6UW5YV9F7
        ENABLE_HARDENED_RUNTIME: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        PRODUCT_NAME: Weather
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        # Prevent Xcode from stripping/processing the Perry binary
        STRIP_INSTALLED_PRODUCT: NO
        COPY_PHASE_STRIP: NO
        DEAD_CODE_STRIPPING: NO
        # Use dwarf (not dwarf-with-dsym) — dsymutil can't parse the Perry binary
        DEBUG_INFORMATION_FORMAT: dwarf
    dependencies:
      - framework: CoreLocation.framework
        embed: false
    postBuildScripts:
      - name: "Build with Perry and replace binary"
        basedOnDependencyAnalysis: false
        script: |
          set -e

          PERRY_DIR="/Users/amlug/projects/perry"
          PERRY_COMPILER="${PERRY_DIR}/target/release/perry"
          WEATHER_DIR="${PROJECT_DIR}/.."
          BUILD_TMP="/tmp/perry-weather-xcode-build-mac"

          if [ ! -f "${PERRY_COMPILER}" ]; then
            echo "error: Perry compiler not found at ${PERRY_COMPILER}"
            echo "error: Run: cd ${PERRY_DIR} && cargo build --release"
            exit 1
          fi

          echo "Compiling main.ts with Perry (target: macos)..."
          cd "${PERRY_DIR}"
          "${PERRY_COMPILER}" compile "${WEATHER_DIR}/src/main.ts" -o "${BUILD_TMP}" --target macos

          echo "Replacing Xcode binary with Perry output..."
          cp "${BUILD_TMP}.app/Contents/MacOS/$(basename "${BUILD_TMP}")" "${BUILT_PRODUCTS_DIR}/${EXECUTABLE_PATH}"

          # Re-sign after replacing the binary
          /usr/bin/codesign --force --sign "${EXPANDED_CODE_SIGN_IDENTITY}" --entitlements "${TARGET_TEMP_DIR}/${FULL_PRODUCT_NAME}.xcent" --timestamp=none --generate-entitlement-der "${CODESIGNING_FOLDER_PATH}"

          echo "Perry macOS build complete."
    attributes:
      ProvisioningStyle: Automatic

  Weather iOS:
    type: application
    platform: iOS
    sources:
      - path: WeatheriOS
        excludes:
          - "**/*.plist"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.perry.weather
        INFOPLIST_FILE: WeatheriOS/Info.plist
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: K6UW5YV9F7
        PRODUCT_NAME: Weather
        TARGETED_DEVICE_FAMILY: "1,2"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Prevent Xcode from stripping/processing the Perry binary
        STRIP_INSTALLED_PRODUCT: NO
        COPY_PHASE_STRIP: NO
        DEAD_CODE_STRIPPING: NO
        DEBUG_INFORMATION_FORMAT: dwarf
        # Disable Xcode dylib injection — these crash the Perry binary
        ENABLE_PREVIEWS: NO
        ENABLE_DEBUG_DYLIB: NO
    dependencies:
      - framework: CoreLocation.framework
        embed: false
    postBuildScripts:
      - name: "Build with Perry and replace binary"
        basedOnDependencyAnalysis: false
        script: |
          set -e

          PERRY_DIR="/Users/amlug/projects/perry"
          PERRY_COMPILER="${PERRY_DIR}/target/release/perry"
          WEATHER_DIR="${PROJECT_DIR}/.."
          BUILD_TMP="/tmp/perry-weather-xcode-build"

          if [ ! -f "${PERRY_COMPILER}" ]; then
            echo "error: Perry compiler not found at ${PERRY_COMPILER}"
            echo "error: Run: cd ${PERRY_DIR} && cargo build --release"
            exit 1
          fi

          # Detect simulator vs device from Xcode environment
          if [ "${PLATFORM_NAME}" = "iphonesimulator" ]; then
            PERRY_TARGET="ios-simulator"
          else
            PERRY_TARGET="ios"
          fi

          echo "Compiling main_ios.ts with Perry (target: ${PERRY_TARGET})..."
          cd "${PERRY_DIR}"
          "${PERRY_COMPILER}" compile "${WEATHER_DIR}/src/main_ios.ts" -o "${BUILD_TMP}" --target "${PERRY_TARGET}"

          echo "Replacing Xcode binary with Perry output..."
          cp "${BUILD_TMP}.app/$(basename "${BUILD_TMP}")" "${BUILT_PRODUCTS_DIR}/${EXECUTABLE_PATH}"

          # Remove Xcode-injected dylibs that crash the Perry binary
          rm -f "${BUILT_PRODUCTS_DIR}/${EXECUTABLE_FOLDER_PATH}/__preview.dylib"
          rm -f "${BUILT_PRODUCTS_DIR}/${EXECUTABLE_FOLDER_PATH}/${PRODUCT_NAME}.debug.dylib"
          rm -f "${BUILT_PRODUCTS_DIR}/${EXECUTABLE_FOLDER_PATH}/Weather.debug.dylib"

          # Re-sign after replacing the binary
          if [ "${PLATFORM_NAME}" = "iphonesimulator" ]; then
            /usr/bin/codesign --force --sign - "${CODESIGNING_FOLDER_PATH}"
          else
            /usr/bin/codesign --force --sign "${EXPANDED_CODE_SIGN_IDENTITY}" --entitlements "${TARGET_TEMP_DIR}/${FULL_PRODUCT_NAME}.xcent" --timestamp=none --generate-entitlement-der "${CODESIGNING_FOLDER_PATH}"
          fi

          echo "Perry iOS build complete."
    attributes:
      ProvisioningStyle: Automatic
